<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Tonal Sequence</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/tone@14.8.29/build/Tone.js"></script>
</head>
<body>
  <div id="app">
    <div class="menu">
      <h1>Guess the Tonal Sequence</h1>
      <button id="start-game">Start Game</button>
    </div>
    <div class="game hidden">
      <h2 id="scale-name"></h2>
      <p>Click the button matching the sequence you heard!</p>
      <button id="replay-chords">Replay Chords</button>
      <button id="replay-notes">Replay Notes</button>
      <div id="options"></div>
      <p id="feedback"></p>
    </div>
  </div>
  <script type=module src="app.js"></script>
</body>
</html>
